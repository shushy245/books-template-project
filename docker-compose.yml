services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reading_room
      POSTGRES_PASSWORD: reading_room
      POSTGRES_DB: reading_room
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reading_room_test
      POSTGRES_PASSWORD: reading_room_test
      POSTGRES_DB: reading_room_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
