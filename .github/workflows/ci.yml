name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres_test:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reading_room_test
          POSTGRES_PASSWORD: reading_room_test
          POSTGRES_DB: reading_room_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm -r test

      - name: Integration tests (Knex migrations)
        run: pnpm --filter @reading-room/backend test:integration
        env:
          DB_TEST_PORT: 5433
          DB_TEST_USER: reading_room_test
          DB_TEST_PASSWORD: reading_room_test
          DB_TEST_NAME: reading_room_test

      - name: Build frontend
        run: pnpm --filter @reading-room/frontend build

      - name: Start backend
        run: pnpm --filter @reading-room/backend dev &
        env:
          PORT: 3000

      - name: Cypress E2E
        run: pnpm --filter @reading-room/frontend cypress:run
        env:
          CYPRESS_BASE_URL: http://localhost:5173
